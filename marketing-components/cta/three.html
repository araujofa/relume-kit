<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <title>CTA 3 Relume Kit</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            text-decoration: none;
            font-family: "Roboto", sans-serif;
        }

        section {
            width: 100%;
            height: 440px;
            background-image: url("./full-length-shot-smiling-korean-female-tourist-medical-face-mask-posing-with-suitcase-going-va.jpg");
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            padding: 112px 64px;
            display: flex;
            flex-direction: column;
        }


        section>h1 {
            color: black;
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 24px;
        }

        section>p {
            color: black;
            font-size: 18px;
            font-weight: 400;
            margin-bottom: 32px;
        }

        .button-wrapper {
            display: flex;
            gap: 16px;
        }

        button {
            width: 96px;
            height: 48px;
            background-color: white;
            color: black;
            border: none;
            font-weight: 400;
            font-size: 16px;
            border: 1px solid white;
        }

        button:nth-child(2) {
            background-color: transparent;
        }

    </style>
</head>

<body>

    <section>
        <h1>Lorem ipsum dolor sit amet.</h1>
        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Fuga officia voluptatum dignissimos itaque, dolorem
            error!</p>
        <div class="button-wrapper">
            <button>Button</button>
            <button>Button</button>
        </div>
    </section>

</body>

</html>
