<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            text-decoration: none;
            background: none;
            border: none;
            font-family: "Roboto", sans-serif;
        }

        header {
            width: 100%;
            height: 72px;
            display: flex;
            justify-content: space-between;
            padding: 16px 64px;
            align-items: center;
        }

        header>img {
            width: 84px;
            height: 36px;
        }

        nav {
            display: flex;
            gap: 32px;
            align-items: center;
        }

        a {
            font-size: 16px;
            font-weight: 400;
            color: black;
        }

        .dropdown-menu {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .cta-button {
            padding: 8px 20px;
            background-color: black;
            color: white;
            font-size: 16px;
            font-weight: 400;
        }
    </style>
</head>

<body>

    <header>

        <img src="./assets/images/company-logo.svg" alt="">

        <nav>

            <a href="">Link One</a>
            <a href="">Link Two</a>
            <a href="">Link Three</a>
            <div class="dropdown-menu">
                <a href="">Link Four</a>
                <button class="chevron-btn">
                    <img src="./assets/images/chevron-down.svg" alt="">
                </button>
            </div>

        </nav>

        <button class="cta-button">Button</button>

    </header>

</body>

</html>
