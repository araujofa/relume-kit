<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTA 20 Relume Kit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            text-decoration: none;
            font-family: "Roboto", sans-serif;
        }

        section {
            padding: 112px 64px;
            width: 100%;
            height: 474px;
        }

        section>h1 {
            font-size: 48px;
            font-weight: bold;
            margin-bottom: 24px;
        }

        section>p {
            font-size: 18px;
            font-weight: 400;
            margin-bottom: 32px;
        }

        input {
            width: 394px;
            height: 48px;
            padding: 12px;
            border: 1px solid black;
        }

        input::placeholder {
            font-size: 16px;
            color: rgba(0, 0, 0, 0.60);
        }

        .button-group {
            display: flex;
            gap: 16px;
            margin-bottom: 16px;
        }

        button {
            background-color: black;
            color: white;
            width: 103px;
            height: 48px;
            border: 1px solid black;
            font-size: 16px;
        }

        form>p {
            font-size: 12px;
            font-weight: 400;
        }

        form>p>span {
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <section>
        <h1>Lorem ipsum dolor sit amet.</h1>
        <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Magni odit exercitationem.</p>
        <form action="#"">
            <div class="button-group">
                <input type="email" placeholder="Enter your email">
                <button type="submit">Sign Up</button>
            </div>
            <p>By clicking Sign Up you're confirming that you agree with our <span>Terms and Conditions</span>.</p>
        </form>
    </section>
</body>

</html>
